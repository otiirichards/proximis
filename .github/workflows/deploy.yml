name: Deploy Proximis

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run build
      - uses: actions/deploy-pages@v2
        with:
          artifact_name: github-pages
      - uses: actions/upload-pages-artifact@v2
        with:
          path: dist

permissions:
  contents: read
  pages: write
  id-token: write
